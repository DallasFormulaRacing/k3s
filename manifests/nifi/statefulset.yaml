apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nifi
  namespace: nifi
spec:
  serviceName: nifi-headless
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: nifi
  template:
    metadata:
      labels:
        app: nifi
    spec:
      containers:
        - name: nifi
          image: apache/nifi:1.28.1
          env:
            - name: NIFI_WEB_HTTPS_HOST
              value: "0.0.0.0"
            - name: NIFI_WEB_HTTPS_PORT
              value: "8443"
            - name: NIFI_WEB_PROXY_HOST
              value: "nifi.tail2e3bd2.ts.net:8443,100.124.153.60"
            - name: SINGLE_USER_CREDENTIALS_USERNAME
              value: "admin"
            - name: SINGLE_USER_CREDENTIALS_PASSWORD
              value: "***REMOVED***"
          ports:
            - name: https
              containerPort: 8443
          volumeMounts:
            - name: nifi-pvc
              mountPath: /opt/nifi/nifi-current/data
      volumes:
        - name: nifi-pvc
          persistentVolumeClaim:
            claimName: nifi-pvc