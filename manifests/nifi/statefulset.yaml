apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nifi
  namespace: nifi
spec:
  serviceName: nifi-headless
  replicas: 1
  selector:
    matchLabels:
      app: nifi
  template:
    metadata:
      labels:
        app: nifi
    spec:
      containers:
        - name: nifi
          image: apache/nifi:1.28.1
          env:
            - name: SINGLE_USER_CREDENTIALS_USERNAME
              value: "admin"
            - name: SINGLE_USER_CREDENTIALS_PASSWORD
              value: "***REMOVED***"
          volumeMounts:
            - name: nifi-pvc
              mountPath: /opt/nifi/nifi-current/data
      volumes:
        - name: nifi-pvc
          persistentVolumeClaim:
            claimName: nifi-pvc