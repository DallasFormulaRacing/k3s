# Headless service — required by StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: nifi-headless
  namespace: nifi
spec:
  clusterIP: None
  selector:
    app: nifi
  ports:
    - port: 8443
      name: https
---
# UI access
apiVersion: v1
kind: Service
metadata:
  annotations:
      tailscale.com/expose: "true"
      tailscale.com/hostname: "nifi"
  name: nifi-ui
  namespace: nifi
spec:
  type: ClusterIP
  selector:
    app: nifi
  ports:
    - port: 443
      targetPort: 8443
      name: https