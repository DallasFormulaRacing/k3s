apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale
spec:
  destination:
    namespace: tailscale
    server: https://kubernetes.default.svc
  source:
    repoURL: https://pkgs.tailscale.com/helmcharts
    targetRevision: 1.94.2
    chart: tailscale-operator
    helm:
      values: |-
        apiServerProxyConfig:
          mode: "true"
  project: default
  syncPolicy:
    automated:
      prune: true
      enabled: true
    syncOptions:
      - CreateNamespace=true
