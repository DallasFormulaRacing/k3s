apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale
spec:
  destination:
    namespace: tailscale
    server: https://kubernetes.default.svc
  source:
    path: ''
    repoURL: https://pkgs.tailscale.com/helmcharts
    targetRevision: 1.94.2
    chart: tailscale-operator
    helm:
      valueFiles: []
  sources: []
  project: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      enabled: true
    syncOptions:
      - CreateNamespace=true
