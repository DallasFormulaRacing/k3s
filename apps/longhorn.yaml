apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
spec:
  destination:
    namespace: longhorn
    server: https://kubernetes.default.svc
  sources:
  - repoURL: https://charts.longhorn.io
    targetRevision: '*'
    chart: longhorn
    helm:
      values: |-
        preUpgradeChecker:
          jobEnabled: false
        defaultSettings:
          defaultDataPath: /longhorn
          defaultReplicaCount: "1"
        defaultBackupStore:
          backupTarget: "s3://db-backups-s3-us-east-2-754437490409-us-east-2-an@us-east-2/longhorn-backup/"
          backupTargetCredentialSecret: "longhorn-backup-s3"
        service:
          ui:
            annotations:
              tailscale.com/expose: "true"
              tailscale.com/hostname: "longhorn"
  - repoURL: https://github.com/DallasFormulaRacing/k3s
    path: manifests/longhorn
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
