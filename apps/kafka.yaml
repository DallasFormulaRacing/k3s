apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka
spec:
  destination:
    namespace: kafka
    server: https://kubernetes.default.svc
  source:
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: '*'
    chart: kafka
    helm:
      values: |-
        controller:
          replicaCount: 1
          persistence:
            storageClass: longhorn
            size: 10Gi
        broker:
          replicaCount: 0
  project: default
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
