apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: routes
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/DallasFormulaRacing/k3s.git
    path: manifests/routes
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      enabled: true
