apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare
spec:
  destination:
    namespace: cloudflare
    server: https://kubernetes.default.svc
  source:
    repoURL: https://cloudflare.github.io/helm-charts
    chart: cloudflare-tunnel-remote
    targetRevision: '*'
    helm:
      values: |-
        replicaCount: 2
  ignoreDifferences:
    - kind: Secret
      name: cloudflare-cloudflare-tunnel-remote
      jsonPointers:
        - /data/tunnelToken
        - /stringData
  project: default
  syncPolicy:
    automated:
      prune: true
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
