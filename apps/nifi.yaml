apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nifi
spec:
  destination:
    namespace: nifi
    server: https://kubernetes.default.svc
  source:
    repoURL: https://sakkiii.github.io/apache-nifi-helm
    targetRevision: '*'
    chart: nifi
    helm:
      values: |-
        podLabels:
          admission.datadoghq.com/enabled: "false"

        service:
          annotations:
            tailscale.com/expose: "true"
            tailscale.com/hostname: "nifi"
  project: default
  syncPolicy:
    automated:
      prune: true
      enabled: true
    syncOptions:
      - CreateNamespace=true
