apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nifi
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: nifi
  source:
    repoURL: https://github.com/DallasFormulaRacing/k3s.git
    targetRevision: main
    path: manifests/nifi
  project: default
  syncPolicy:
    automated:
      prune: true
      enabled: true
    syncOptions:
      - CreateNamespace=true